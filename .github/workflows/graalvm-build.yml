name: Build GraalVM Native Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "ECR image tag (optional, default: rest-graalvm-<date>-<run>)"
        required: false
        default: ""
      scenario_type:
        description: "Scenario type for tag prefix"
        required: false
        default: "rest"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      ECR_REPOSITORY: benchmark-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            TAG="${{ inputs.image_tag }}"
          else
            DATE_STR=$(date +%Y-%m-%d)
            RUN_STR=$(date +%H%M%S)
            TAG="${{ inputs.scenario_type }}-graalvm-${DATE_STR}-${RUN_STR}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "IMAGE_URI=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${TAG}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push GraalVM image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f Scenarios/REST/spring-boot-app/Dockerfile.graalvm \
            -t "$IMAGE_URI" \
            --push \
            Scenarios/REST/spring-boot-app

      - name: Show image URI
        run: |
          echo "Built and pushed: $IMAGE_URI"
