spring:
  application:
    name: spring-boot-benchmark

  threads:
    virtual:
      enabled: ${VIRTUAL_THREADS_ENABLED:true}

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/benchmark}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:100}
      minimum-idle: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        bytecode:
          provider: none
          use_reflection_optimizer: false
        format_sql: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
  tomcat:
    threads:
      max: ${TOMCAT_MAX_THREADS:200}
      min-spare: 10
    max-connections: 10000
    accept-count: 100

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
      cloudwatch:
        enabled: ${METRICS_CLOUDWATCH_ENABLED:false}
        namespace: ${METRICS_CLOUDWATCH_NAMESPACE:JavaBenchmark}
        step: ${METRICS_CLOUDWATCH_STEP:1m}
        batch-size: 100
        enabled-percentile-aggregation: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
    tags:
      application: ${spring.application.name}
      java_version: ${java.version}
      environment: ${APP_ENV:local}
      app_image: ${APP_IMAGE:unknown}

logging:
  level:
    root: INFO
    com.benchmark.app: INFO
    org.springframework.web: INFO
    org.hibernate: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
app:
  clear-db-on-start: ${CLEAR_DB_ON_START:false}
  db-stats:
    enabled: ${APP_DB_STATS_ENABLED:false}
    interval-ms: ${APP_DB_STATS_INTERVAL_MS:10000}