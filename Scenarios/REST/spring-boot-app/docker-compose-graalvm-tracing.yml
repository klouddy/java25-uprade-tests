version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: tracing-postgres
    environment:
      POSTGRES_DB: benchmark
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  graalvm-tracing-agent:
    build:
      context: .
      dockerfile: Dockerfile.graalvm-tracing
    container_name: spring-boot-tracing-agent
    entrypoint: []
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/benchmark
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      SPRING_PROFILES_ACTIVE: local
      MAVEN_OPTS: "-Xmx2g"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Mount directory to extract generated metadata from /tmp/agent
      - ./generated-metadata:/tmp/agent

volumes:
  postgres-data:
